name: entries
type: MAP
label: Entries
subtype: STRUCT
subfields:
  - name: type
    label: Type
    type: SELECT
    selectList: credentialentrytypes
  - name: locationtype
    label: Usage Location
    type: SELECT
    selectlist: paramlocations
  - name: locationname
    label: Location name
    type: TEXT
  - name: value
    label: Value
    type: TEXT
    validFor:
      - type: hasValue
        value: ${value}
  - name: secret
    label: Secret Name
    type: REFERENCE
    reference:
      collection: secret
    validFor:
      - field: type
        value: secret
  - name: configvalue
    label: Config Value Name
    type: REFERENCE
    reference:
      collection: configvalue
    validFor:
      - field: type
        value: configvalue
  - name: merge
    label: Merge expression
    type: TEXT
    validFor:
      - field: type
        value: merge
