name: userintegrationcredentials
definition:
  # Wires are how we pull in data
  wires:
    users:
      collection: uesio/core.user
      fields:
        uesio/core.id:
        uesio/core.firstname:
        uesio/core.lastname:
        uesio/core.username:
        uesio/core.initials:
        uesio/core.profile:
        uesio/core.picture:
        uesio/core.language:
      conditions:
        - field: uesio/core.id
          valueSource: VALUE
          value: $User{id}
    integrationcredentials:
      collection: uesio/core.myintegrationcredentials
      init:
        query: false
        create: false
  events:
    onload:
      - signal: wire/LOAD
        wires:
          - integrationcredentials
  # Components are how we describe the layout of our view
  components:
    - uesio/studio.mainlayout:
        topbar:
          - uesio/core.view:
              view: uesio/studio.topbar
        leftbar:
          - uesio/core.view:
              view: uesio/studio.userprofilenav
              uesio.context:
                wire: users
              params:
                selected: integrationcredentials
        content:
          - uesio/io.box:
              components:
                - uesio/io.titlebar:
                    uesio.variant: uesio/io.main
                    title: My Integration Credentials
                # - uesio/io.searchbox:
                #     wire: integrationcredentials
                #     focusOnRender: true
                - uesio/io.table:
                    wire: integrationcredentials
                    columns:
                      - field: uesio/core.integration
                      - field: uesio/core.hasrefreshtoken
                      - field: uesio/core.hasaccesstoken
                      - field: uesio/core.accesstokenexpiration
                      - field: uesio/core.updatedat
                      - field: uesio/core.createdat
