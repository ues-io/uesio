name: Master/Release Branch Build
on:
  push:
    branches:
      - master
      - workflow-changes
      # - stable-december-2022
    secrets:
      GH_PAT:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [16.x]
        go-version: [~1.19]
    outputs:
      newImage: ${{ steps.dockerize.outputs.fullImage }}
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0
