name: Build and Deploy DEV

on:
    - push:
          branches:
              - master
              - workflow-changes
    - workflow_dispatch:

env:
    # AWS_REGION: MY_AWS_REGION # set this to your preferred AWS region, e.g. us-west-1
    # ECR_REPOSITORY: MY_ECR_REPOSITORY # set this to your Amazon ECR repository name

    # set this to your Amazon ECS service name
    ECS_SERVICE: tcm-uesio-dev-ecs-service

    # set this to your Amazon ECS cluster name
    ECS_CLUSTER: tcm-uesio-dev-ecs
    # ECS_TASK_DEFINITION:
    #     MY_ECS_TASK_DEFINITION # set this to the path to your Amazon ECS task definition
    #     # file, e.g. .aws/task-definition.json
    ECS_CONTAINER_NAME: uesio_dev
    # the name of the ECS task definition
    ECS_TASK_DEFINITION_NAME: uesio_dev

jobs:
    build-and-test:
        uses: ./.github/workflows/build.yml
    deploy:
        name: Deploy to DEV
        runs-on: ubuntu-latest
        environment: dev

        steps:
            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@13d241b293754004c80624b5567555c4a39ffbe3
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_DEV }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_DEV }}
                  aws-region: ${{ secrets.AWS_REGION_DEV }}

            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@aaf69d68aa3fb14c1d5a6be9ac61fe15b48453a2

            - name: Docker Tag and Push to ECR
              id: push-ecr
              env:
                  IMAGE_TAG: ${{ steps.login-ecr.outputs.registry }}/uesio:${{ github.sha }}
              run: |
                  docker tag $IMAGE_TAG
                  docker push $IMAGE_TAG
                  echo "image=$IMAGE_TAG" >> $GITHUB_OUTPUT

            - name: Download ECS task definition
              env:
                  TASK_DEF_NAME: ${{ env.ECS_TASK_DEFINITION_NAME }}
              run: |
                  aws ecs describe-task-definition --task-definition $TASK_DEF_NAME --query taskDefinition > task-definition.json

            - name: Fill in the new image ID in the Amazon ECS task definition
              id: ecs-task-def
              uses: aws-actions/amazon-ecs-render-task-definition@97587c9d45a4930bf0e3da8dd2feb2a463cf4a3a
              with:
                  task-definition: task-definition.json
                  container-name: ${{ env.ECS_CONTAINER_NAME }}
                  image: ${{ steps.push-ecr.outputs.image }}

            - name: Deploy Amazon ECS task definition
              uses: aws-actions/amazon-ecs-deploy-task-definition@de0132cf8cdedb79975c6d42b77eb7ea193cf28e
              with:
                  task-definition: ${{ steps.ecs-task-def.outputs.task-definition }}
                  service: ${{ env.ECS_SERVICE }}
                  cluster: ${{ env.ECS_CLUSTER }}
                  wait-for-service-stability: true
