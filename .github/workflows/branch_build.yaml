name: Non-master branch build
on:
  push:
    branches-ignore:
      - "master"
    tags-ignore:
      - "*"
    secrets:
      AWS_ACCESS_KEY_STATIC_ASSETS:
        required: true
      AWS_SECRET_ACCESS_KEY_STATIC_ASSETS:
        required: true
      AWS_STATIC_ASSETS_BUCKET:
        required: true
      AWS_REGION:
        required: true

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    env:
      FULL_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Setup Uesio CLI Symlink
        shell: bash
        run: |
          # Symlink for Uesio CLI, which is created in build and then used in subsequent builds and tests
          mkdir -p dist/cli
          sudo ln -s $PWD/dist/cli/uesio /usr/local/bin/uesio
      - name: Setup node
        uses: actions/setup-node@v3
        with:
          node-version: 18.15.0
          cache: "npm"
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.19
          cache-dependency-path: apps/*/go.sum
      - name: Install, lint, build, test
        shell: bash
        run: |
          npm ci
          # npm run prettier-check
          # npm run affected:lint -- --base=origin/master --head=$GITHUB_SHA --parallel
          npm run build-all
          # npm run affected:test -- --base=origin/master --head=$GITHUB_SHA --parallel
          export GITSHA=$(echo ${GITHUB_SHA} | cut -c1-8)
          echo "GITSHA=`echo ${GITHUB_SHA} | cut -c1-8`" >> $GITHUB_ENV
      - uses: zachelrath/upload-s3-action@ac9621e70670c534d744e95c84b993d8f4745196
        name: Upload vendor files to S3
        id: s3UploadVendor
        with:
          aws_key_id: ${{ secrets.AWS_ACCESS_KEY_STATIC_ASSETS }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY_STATIC_ASSETS}}
          aws_bucket: ${{ secrets.AWS_STATIC_ASSETS_BUCKET }}
          source_dir: "dist/vendor"
          destination_dir: "static/vendor"
          acl: "bucket-owner-full-control"
      - uses: zachelrath/upload-s3-action@ac9621e70670c534d744e95c84b993d8f4745196
        name: Upload Uesio static files to S3
        id: s3UploadUesio
        with:
          aws_key_id: ${{ secrets.AWS_ACCESS_KEY_STATIC_ASSETS }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY_STATIC_ASSETS}}
          aws_bucket: ${{ secrets.AWS_STATIC_ASSETS_BUCKET }}
          source_dir: "dist/ui"
          destination_dir: ${{ env.GITSHA }}/static/ui
          acl: "bucket-owner-full-control"
